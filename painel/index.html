<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Painel de Indicadores Abertos — Educação de Joinville/SC — Censo Escolar e indicadores INEP">
  <title>Painel de Indicadores Abertos — Educação Joinville/SC</title>
  <link rel="stylesheet" href="css/styles.css?v=20">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

  <!-- ══ SIDEBAR OVERLAY (mobile) ══ -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="img/logo_joinville.png" alt="Prefeitura de Joinville" class="sidebar-logo" onerror="this.style.display='none'">
      <div class="sidebar-title">
        <span class="sidebar-title-main">Painel de Indicadores Abertos</span>
        <span class="sidebar-title-sub">Educação — Joinville/SC</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">NAVEGAÇÃO</div>
      <nav class="sidebar-nav">
        <button class="sidebar-tab active" data-view="home" id="tab-home"><img class="nav-icon" src="img/icons/nav_home.png" alt="" onerror="this.style.display='none'"> Início</button>
        <button class="sidebar-tab" data-view="acesso" id="tab-acesso"><img class="nav-icon" src="img/icons/nav_acesso.png" alt="" onerror="this.style.display='none'"> Acesso e Matrículas</button>
        <button class="sidebar-tab" data-view="infra" id="tab-infra"><img class="nav-icon" src="img/icons/nav_infra.png" alt="" onerror="this.style.display='none'"> Infraestrutura</button>
        <button class="sidebar-tab" data-view="icg" id="tab-icg"><img class="nav-icon" src="img/icons/escola.png" alt="" onerror="this.style.display='none'"> Complexidade de Gestão</button>
        <button class="sidebar-tab" data-view="inse" id="tab-inse"><img class="nav-icon" src="img/icons/nav_desigualdades.png" alt="" onerror="this.style.display='none'"> Contexto Socioeconômico (INSE)</button>
        <button class="sidebar-tab" data-view="docencia" id="tab-docencia"><img class="nav-icon" src="img/icons/sec_docentes.png" alt="" onerror="this.style.display='none'"> Docência</button>
        <button class="sidebar-tab" data-view="afd" id="tab-afd"><img class="nav-icon" src="img/icons/professor.png" alt="" onerror="this.style.display='none'"> Formação Docente (AFD)</button>
        <button class="sidebar-tab" data-view="fluxo" id="tab-fluxo"><img class="nav-icon" src="img/icons/sec_evolucao.png" alt="" onerror="this.style.display='none'"> Fluxo e Rendimento</button>
        <button class="sidebar-tab" data-view="tdi" id="tab-tdi"><img class="nav-icon" src="img/icons/politicas.png" alt="" onerror="this.style.display='none'"> Distorção Idade-Série</button>
        <!-- Aba de avaliação local (SAERS no RS) — oculta até definir a avaliação de Joinville (ex: Diagnóstica Bússola)
        <button class="sidebar-tab" data-view="saers" id="tab-saers"><img class="nav-icon" src="img/icons/sec_saeb.png" alt="" onerror="this.style.display='none'"> SAERS</button>
        -->
        <!-- /Aba avaliação local -->

        <!-- Aba Desigualdades (SAERS/RS) — oculta em Joinville
        <button class="sidebar-tab" data-view="desigualdades" id="tab-desigualdades"><img class="nav-icon" src="img/icons/nav_desigualdades.png" alt="" onerror="this.style.display='none'"> Desigualdades</button>
        -->
        <button class="sidebar-tab" data-view="saeb" id="tab-saeb"><img class="nav-icon" src="img/icons/sec_saeb.png" alt="" onerror="this.style.display='none'"> SAEB</button>
        <button class="sidebar-tab" data-view="ideb" id="tab-ideb"><img class="nav-icon" src="img/icons/nav_ideb.png" alt="" onerror="this.style.display='none'"> IDEB</button>
        <button class="sidebar-tab" data-view="escolas" id="tab-escolas"><img class="nav-icon" src="img/icons/escola.png" alt="" onerror="this.style.display='none'"> Visão por Escola</button>
      </nav>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-badge">Secretaria de Educação de Joinville</div>
      <div class="sidebar-footer-logos">
        <img src="img/logo_joinville.png" alt="Joinville" class="sidebar-footer-logo" onerror="this.style.display='none'">
      </div>
      <div class="sidebar-footer-text">
        Painel de Indicadores Abertos<br>
        Secretaria de Educação de Joinville
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main" id="main-wrapper">
    <div class="main-scroll" id="main-content">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Carregando dados do Censo Escolar...</span>
      </div>
    </div>
  </main>

  <script src="js/app.js?v=59"></script>
</body>

</html>
